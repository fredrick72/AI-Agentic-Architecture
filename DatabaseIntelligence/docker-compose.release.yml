# Athena - Production release compose
# IMAGE_OWNER and IMAGE_TAG are replaced by the release workflow.
# Do not edit this file directly — edit docker-compose.yml in the source repo.

networks:
  athena-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  schema-service:
    image: ghcr.io/IMAGE_OWNER/athena-schema-service:IMAGE_TAG
    container_name: athena-schema
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=dbintel
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-athena_password}
      - REDIS_URL=redis://redis:6379
    ports:
      - "8010:8010"
    networks:
      - athena-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  query-agent:
    image: ghcr.io/IMAGE_OWNER/athena-query-agent:IMAGE_TAG
    container_name: athena-agent
    env_file: .env
    environment:
      - SCHEMA_SERVICE_URL=http://schema-service:8010
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=dbintel
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-athena_password}
      - REDIS_URL=redis://redis:6379
      - MAX_RESULT_ROWS=1000
      - QUERY_TIMEOUT_SECONDS=30
    ports:
      - "8011:8011"
    networks:
      - athena-net
    depends_on:
      postgres:
        condition: service_healthy
      schema-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: ghcr.io/IMAGE_OWNER/athena-frontend:IMAGE_TAG
    container_name: athena-frontend
    environment:
      - VITE_SCHEMA_SERVICE_URL=http://localhost:8010
      - VITE_QUERY_AGENT_URL=http://localhost:8011
    ports:
      - "8080:5174"
    networks:
      - athena-net
    depends_on:
      - query-agent
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: athena-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-athena_password}
      POSTGRES_DB: dbintel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - athena-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: athena-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - athena-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
